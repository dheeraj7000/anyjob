<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg-0: #0b0e1a;
        --bg-1: #12172b;
        --card: #171d33;
        --card-border: #262e4d;
        --text: #e7e9f5;
        --text-dim: #8891b5;
        --accent-1: #7c5cff;
        --accent-2: #ff5ca8;
        --accent-3: #35e0c9;
        --good: #35e0a5;
        --bad: #ff5c7a;
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        min-height: 100vh;
        background: radial-gradient(circle at 15% 0%, #23205a 0%, transparent 45%),
          radial-gradient(circle at 100% 20%, #1c3b4a 0%, transparent 40%), var(--bg-0);
        background-attachment: fixed;
        padding: 14px 14px 24px;
        overflow-x: hidden;
      }

      /* subtle drifting sparkle field behind everything */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image: radial-gradient(2px 2px at 20% 30%, rgba(124, 92, 255, 0.55), transparent),
          radial-gradient(2px 2px at 70% 65%, rgba(255, 92, 168, 0.45), transparent),
          radial-gradient(1.5px 1.5px at 40% 80%, rgba(53, 224, 201, 0.5), transparent),
          radial-gradient(1.5px 1.5px at 85% 15%, rgba(255, 255, 255, 0.35), transparent);
        background-size: 200% 200%;
        animation: drift 22s ease-in-out infinite alternate;
        opacity: 0.6;
      }

      @keyframes drift {
        0% {
          background-position: 0% 0%;
        }
        100% {
          background-position: 40% 60%;
        }
      }

      header,
      .card,
      #confetti {
        position: relative;
        z-index: 1;
      }

      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .logo {
        font-size: 26px;
        display: inline-block;
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) rotate(-4deg);
        }
        50% {
          transform: translateY(-4px) rotate(4deg);
        }
      }

      h1 {
        font-size: 17px;
        margin: 0;
        background: linear-gradient(90deg, var(--accent-1), var(--accent-2) 60%, var(--accent-3));
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shine 6s linear infinite;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      .tagline {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .card {
        background: linear-gradient(180deg, var(--card), rgba(23, 29, 51, 0.7));
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-bottom: 12px;
        box-shadow: 0 6px 18px -8px rgba(0, 0, 0, 0.5);
        animation: rise 0.4s ease both;
      }

      .card + .card {
        animation-delay: 0.05s;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
        display: block;
        margin-bottom: 4px;
        color: var(--text);
      }

      input[type="password"],
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 12px;
        margin-bottom: 8px;
        background: var(--bg-1);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      input[type="password"]:focus,
      input[type="text"]:focus {
        border-color: var(--accent-1);
        box-shadow: 0 0 0 3px rgba(124, 92, 255, 0.25);
      }

      /* File pickers rendered as a dashed "dropzone" pill instead of the raw
         browser widget -- the native input is visually hidden but still
         keyboard/click accessible via the label wrapping it. */
      .dropzone {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1.5px dashed var(--card-border);
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, transform 0.1s;
        background: rgba(255, 255, 255, 0.02);
      }

      .dropzone:hover {
        border-color: var(--accent-1);
        background: rgba(124, 92, 255, 0.08);
      }

      .dropzone:active {
        transform: scale(0.99);
      }

      .dropzone input[type="file"] {
        display: none;
      }

      .dropzone .icon {
        font-size: 18px;
      }

      .dropzone .file-label {
        font-size: 12px;
        color: var(--text-dim);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .dropzone.has-file .file-label {
        color: var(--accent-3);
        font-weight: 600;
      }

      button {
        width: 100%;
        padding: 9px;
        font-size: 12.5px;
        margin-bottom: 4px;
        cursor: pointer;
        border: 1px solid var(--card-border);
        border-radius: 9px;
        background: var(--bg-1);
        color: var(--text);
        font-weight: 600;
        transition: transform 0.08s, filter 0.15s, background 0.15s;
      }

      button:hover:not(:disabled) {
        filter: brightness(1.15);
      }

      button:active:not(:disabled) {
        transform: scale(0.98);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #fillBtn {
        background: linear-gradient(90deg, var(--accent-1), var(--accent-2));
        color: white;
        border: none;
        border-radius: 11px;
        font-size: 14.5px;
        padding: 13px;
        margin-top: 2px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 6px 20px -6px rgba(124, 92, 255, 0.6);
      }

      #fillBtn:hover:not(:disabled) {
        box-shadow: 0 8px 24px -6px rgba(255, 92, 168, 0.55);
      }

      #fillBtn.loading {
        background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3), var(--accent-1));
        background-size: 300% auto;
        animation: shine 1.8s linear infinite;
      }

      #fillBtn .btn-text {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        width: 100%;
      }

      .spinner {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: white;
        animation: spin 0.7s linear infinite;
        display: none;
      }

      #fillBtn.loading .spinner {
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      #status {
        font-size: 12px;
        margin: 2px 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
        min-height: 16px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-dim);
        flex-shrink: 0;
      }

      #status.ok .status-dot {
        background: var(--good);
        box-shadow: 0 0 8px var(--good);
        animation: pulse 1.6s ease-in-out infinite;
      }

      #status.err .status-dot {
        background: var(--bad);
        box-shadow: 0 0 8px var(--bad);
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.3);
          opacity: 0.7;
        }
      }

      .ok {
        color: var(--good);
      }

      .err {
        color: var(--bad);
      }

      hr {
        border: none;
        border-top: 1px solid var(--card-border);
        margin: 14px 0;
      }

      #resumeInfo,
      #coverLetterInfo {
        font-size: 11.5px;
        margin-top: 2px;
        min-height: 14px;
      }

      #result ul {
        list-style: none;
        padding-left: 0;
        margin: 6px 0 0;
      }

      #result li {
        font-size: 12px;
        padding: 6px 8px;
        border-radius: 7px;
        margin-bottom: 4px;
        background: rgba(255, 255, 255, 0.03);
        display: flex;
        gap: 6px;
        align-items: flex-start;
        opacity: 0;
        transform: translateX(-6px);
        animation: pop-in 0.3s ease forwards;
        word-break: break-word;
      }

      @keyframes pop-in {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      #result li.filled {
        border-left: 3px solid var(--good);
      }

      #result li.skipped {
        border-left: 3px solid var(--bad);
      }

      #result code {
        background: rgba(255, 255, 255, 0.06);
        padding: 1px 4px;
        border-radius: 4px;
        font-size: 11px;
      }

      details {
        margin-top: 4px;
      }

      summary {
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-dim);
        list-style: none;
        display: flex;
        align-items: center;
        gap: 6px;
        user-select: none;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary .chevron {
        transition: transform 0.15s;
        display: inline-block;
      }

      details[open] summary .chevron {
        transform: rotate(90deg);
      }

      #log {
        font-family: ui-monospace, "SF Mono", Consolas, monospace;
        font-size: 10.5px;
        line-height: 1.55;
        background: #0a0d1a;
        border: 1px solid var(--card-border);
        border-radius: 9px;
        padding: 8px;
        height: 190px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        margin-top: 8px;
      }

      .log-status {
        color: #9aa3c9;
      }

      .log-token {
        color: var(--text);
      }

      .log-error {
        color: var(--bad);
        font-weight: 600;
      }

      .log-result {
        color: var(--good);
        font-weight: 600;
      }

      .log-time {
        color: #4a5278;
      }

      /* Confetti burst -- lightweight emoji particles, no canvas/libs. */
      #confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 50;
      }

      .confetti-piece {
        position: absolute;
        top: -20px;
        font-size: 16px;
        animation: fall linear forwards;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(360deg);
          opacity: 0.2;
        }
      }
    </style>
  </head>
  <body>
    <div id="confetti"></div>

    <header>
      <span class="logo">🚀</span>
      <div>
        <h1>anyjob AI Fill</h1>
        <div class="tagline">scan, fill, submit yourself — repeat with less pain</div>
      </div>
    </header>

    <div class="card">
      <div class="card-title">🔌 Connection</div>
      <label for="token">Server token (from `npm run start-all` output)</label>
      <input id="token" type="password" placeholder="paste token here" />
      <button id="saveToken">Save token</button>
      <div id="status"><span class="status-dot"></span><span class="status-text">Checking server...</span></div>
    </div>

    <div class="card">
      <div class="card-title">📄 Resume</div>
      <label class="dropzone" id="resumeDrop" for="resumeFile">
        <span class="icon">📎</span>
        <span class="file-label" id="resumeFileLabel">Choose a resume (.pdf/.docx/.txt)</span>
        <input id="resumeFile" type="file" accept=".pdf,.docx,.txt" />
      </label>
      <button id="uploadResumeBtn">✨ Extract my details</button>
      <div id="resumeInfo"></div>
    </div>

    <div class="card">
      <div class="card-title">💌 Cover letter</div>
      <label class="dropzone" id="coverLetterDrop" for="coverLetterFile">
        <span class="icon">📎</span>
        <span class="file-label" id="coverLetterFileLabel">Choose a cover letter (.pdf/.docx/.txt)</span>
        <input id="coverLetterFile" type="file" accept=".pdf,.docx,.txt" />
      </label>
      <button id="uploadCoverLetterBtn">Save cover letter</button>
      <div id="coverLetterInfo"></div>
    </div>

    <button id="fillBtn">
      <span class="btn-text"><span class="spinner"></span><span class="label">Scan &amp; Fill This Page</span></span>
    </button>
    <div id="result"></div>

    <details>
      <summary><span class="chevron">▸</span> Live log</summary>
      <div id="log"></div>
    </details>

    <script src="sidepanel.js"></script>
  </body>
</html>
